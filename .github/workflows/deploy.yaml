name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: deploy
        uses: medvesek/infrastructure/github-actions/deploy@master
        with:
          cloudflare-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          server-ip: ${{ secrets.AQUILA_IP }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE_GITHUB_ACTIONS }}
